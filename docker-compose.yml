version: '3.8'

services:
  whois-hacker:
    build:
      context: .
      dockerfile: Dockerfile
    image: whois-hacker:latest
    container_name: whois-hacker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - RATE_LIMIT_PER_MINUTE=60
      - ENABLE_RATE_LIMIT=true
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["serve", "--host", "0.0.0.0", "--port", "8080", "--log-format", "json"]
    volumes:
      - whois_data:/app/data

volumes:
  whois_data:
